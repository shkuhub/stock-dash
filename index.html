<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Sector Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #131722; color: #d1d4dc; margin: 0; padding: 0; overflow: hidden; }
        .nav-btn { transition: all 0.2s; border-radius: 4px; font-weight: 700; font-size: 13px; }
    </style>
</head>
<body class="h-screen flex flex-col p-3">

    <!-- 상단 헤더 및 컨트롤러 -->
    <div class="flex justify-between items-center mb-3 px-1">
        <div class="flex gap-2">
            <button onclick="loadHeatmap('KR')" id="btn-KR" class="nav-btn px-4 py-2 bg-blue-600 text-white shadow-lg">🇰🇷 KOREA SECTORS</button>
            <button onclick="loadHeatmap('US')" id="btn-US" class="nav-btn px-4 py-2 bg-[#2a2e39] text-gray-400 hover:text-white">🇺🇸 USA SECTORS</button>
        </div>
        <div class="text-right">
            <div id="update-time" class="text-[10px] text-gray-500 font-mono uppercase">Syncing...</div>
            <div class="text-[9px] text-blue-500 font-bold uppercase tracking-widest">Source: KRX / TradingView</div>
        </div>
    </div>

    <!-- 히트맵 위젯 영역 -->
    <div id="heatmap-container" class="flex-1 bg-[#1e222d] rounded-lg border border-[#2a2e39] overflow-hidden">
        <!-- 위젯 자동 삽입 -->
    </div>

    <script>
        function loadHeatmap(market) {
            const container = document.getElementById('heatmap-container');
            container.innerHTML = ''; // 기존 위젯 삭제

            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js";
            script.async = true;

            // 핵심: indexFilter 대신 국가별 전체 주식(KOREA/AMERICA) 필터 사용
            const config = market === 'KR' ? {
                "indexFilter": "", 
                "country": "KR", // 한국 전체 주식 대상
                "colors": ["#3b82f6", "#1e222d", "#ef4444"], // 한국식 파랑-빨강
                "hasTopBar": true,
                "isDatasetEnabled": true, // 섹터별 그룹화 강제 활성화
                "defaultSymbolId": "KRX:KOSPI",
                "width": "100%", "height": "100%", "locale": "ko", "colorTheme": "dark"
            } : {
                "indexFilter": "S&P500", // 미국은 S&P500이 가장 정확함
                "colors": ["#ef4444", "#1e222d", "#10b981"], // 미국식 빨강-초록
                "hasTopBar": true,
                "isDatasetEnabled": true,
                "defaultSymbolId": "NASDAQ:QQQ",
                "width": "100%", "height": "100%", "locale": "en", "colorTheme": "dark"
            };

            script.innerHTML = JSON.stringify(config);
            container.appendChild(script);

            // UI 업데이트
            document.getElementById('update-time').innerText = "Last Update: " + new Date().toLocaleTimeString();
            
            const isKR = market === 'KR';
            document.getElementById('btn-KR').className = isKR ? "nav-btn px-4 py-2 bg-blue-600 text-white shadow-lg" : "nav-btn px-4 py-2 bg-[#2a2e39] text-gray-400";
            document.getElementById('btn-US').className = !isKR ? "nav-btn px-4 py-2 bg-green-600 text-white shadow-lg" : "nav-btn px-4 py-2 bg-[#2a2e39] text-gray-400";
        }

        // 초기 실행
        loadHeatmap('KR');
    </script>
</body>
</html>
