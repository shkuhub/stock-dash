<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 섹터 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #191919; color: #e5e7eb; margin: 0; padding: 0; overflow: hidden; }
        .widget-container { height: calc(100 py - 80px); }
        /* 노션 임베드 시 스크롤바 방지 */
        iframe { border: none !important; }
    </style>
</head>
<body>

<div class="p-4 h-screen flex flex-col">
    <!-- 상단 탭 -->
    <div class="flex gap-2 mb-4">
        <button onclick="changeMarket('KR')" id="btn-KR" class="px-6 py-2 rounded-full font-bold bg-red-600 text-white shadow-lg transition-all">🇰🇷 한국 섹터</button>
        <button onclick="changeMarket('US')" id="btn-US" class="px-6 py-2 rounded-full font-bold bg-gray-800 text-gray-400 hover:bg-gray-700 transition-all">🇺🇸 미국 섹터</button>
    </div>

    <!-- 위젯이 들어갈 자리 -->
    <div id="tradingview-widget" class="flex-1 rounded-xl overflow-hidden border border-gray-800">
        <!-- 위젯 스크립트가 여기에 삽입됩니다 -->
    </div>
</div>

<script>
    function loadWidget(market) {
        const container = document.getElementById('tradingview-widget');
        container.innerHTML = ''; // 이전 위젯 삭제

        const script = document.createElement('script');
        script.src = "https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js";
        script.async = true;
        
        // 시장별 설정값
        const config = market === 'KR' ? {
            "indexFilter": "KOSPI",
            "colors": ["#3b82f6", "#1e222d", "#ef4444"], // 한국: 파랑(하락)-빨강(상승)
            "hasTopBar": true, "isDatasetEnabled": true, "width": "100%", "height": "100%", "locale": "ko", "colorTheme": "dark"
        } : {
            "indexFilter": "S&P500",
            "colors": ["#ef4444", "#1e222d", "#10b981"], // 미국: 빨강(하락)-초록(상승)
            "hasTopBar": true, "isDatasetEnabled": true, "width": "100%", "height": "100%", "locale": "en", "colorTheme": "dark"
        };

        script.innerHTML = JSON.stringify(config);
        container.appendChild(script);
    }

    function changeMarket(market) {
        // 버튼 스타일 변경
        const isKR = market === 'KR';
        document.getElementById('btn-KR').className = isKR ? "px-6 py-2 rounded-full font-bold bg-red-600 text-white shadow-lg" : "px-6 py-2 rounded-full font-bold bg-gray-800 text-gray-400";
        document.getElementById('btn-US').className = !isKR ? "px-6 py-2 rounded-full font-bold bg-green-600 text-white shadow-lg" : "px-6 py-2 rounded-full font-bold bg-gray-800 text-gray-400";
        
        loadWidget(market);
    }

    // 초기 실행 (한국 시장)
    loadWidget('KR');
</script>

</body>
</html>
